name: "CI"

on:
  push:
    branches:
      - main
      - staging
    paths:
      - "docuparse-project/**"
      - "pyproject.toml"

jobs:
  pre-deploy:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_VERSION: ${{ steps.extract_version.outputs.IMAGE_VERSION }}
      SKIP: ${{ steps.check_version.outputs.SKIP }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCOUNT_MODIFY_TOKEN }}
          fetch-depth: 0

      - name: Install UV
        uses: astral-sh/setup-uv@v5

      - name: Install pyproject-parser
        run: uv tool install "pyproject-parser[cli]"

      - name: Get Version from pyproject.toml
        id: extract_version
        run: |
          VERSION=$(pyproject-info project.version | tr -d '"')
          echo "IMAGE_VERSION=$VERSION" >> $GITHUB_OUTPUT

  deploy-core:
    needs: pre-deploy
    uses: ./.github/workflows/deploy.yaml
    with:
      IMAGE_NAME: docuparser-core
      IMAGE_VERSION: ${{ needs.pre-deploy.outputs.IMAGE_VERSION }}
      ENVIRONMENT: docuparser-core
      BACKEND_DIR: docuparse-project
      DOCKERFILE_PATH: docuparse-project/backend-core/Dockerfile
    secrets:
      ACCOUNT_MODIFY_TOKEN: ${{ secrets.ACCOUNT_MODIFY_TOKEN }}
      INNOVOX_USERNAME: ${{ secrets.INNOVOX_USERNAME }}
      INNOVOX_PASSWORD: ${{ secrets.INNOVOX_PASSWORD }}

  # Runs after deploy-core to avoid concurrent pushes to the gitops branch
  deploy-com:
    needs: [pre-deploy, deploy-core]
    uses: ./.github/workflows/deploy.yaml
    with:
      IMAGE_NAME: docuparser-com
      IMAGE_VERSION: ${{ needs.pre-deploy.outputs.IMAGE_VERSION }}
      ENVIRONMENT: docuparser-com
      BACKEND_DIR: docuparse-project
      DOCKERFILE_PATH: docuparse-project/backend-com/Dockerfile
    secrets:
      ACCOUNT_MODIFY_TOKEN: ${{ secrets.ACCOUNT_MODIFY_TOKEN }}
      INNOVOX_USERNAME: ${{ secrets.INNOVOX_USERNAME }}
      INNOVOX_PASSWORD: ${{ secrets.INNOVOX_PASSWORD }}

  deploy-ocr:
    needs: [pre-deploy, deploy-com]
    uses: ./.github/workflows/deploy.yaml
    with:
      IMAGE_NAME: docuparser-ocr
      IMAGE_VERSION: ${{ needs.pre-deploy.outputs.IMAGE_VERSION }}
      ENVIRONMENT: docuparser-ocr
      BACKEND_DIR: docuparse-project
      DOCKERFILE_PATH: docuparse-project/backend-ocr/Dockerfile
    secrets:
      ACCOUNT_MODIFY_TOKEN: ${{ secrets.ACCOUNT_MODIFY_TOKEN }}
      INNOVOX_USERNAME: ${{ secrets.INNOVOX_USERNAME }}
      INNOVOX_PASSWORD: ${{ secrets.INNOVOX_PASSWORD }}

  deploy-langextract:
    needs: [pre-deploy, deploy-ocr]
    uses: ./.github/workflows/deploy.yaml
    with:
      IMAGE_NAME: docuparser-langextract
      IMAGE_VERSION: ${{ needs.pre-deploy.outputs.IMAGE_VERSION }}
      ENVIRONMENT: docuparser-langextract
      BACKEND_DIR: docuparse-project
      DOCKERFILE_PATH: docuparse-project/langextract-service/Dockerfile
    secrets:
      ACCOUNT_MODIFY_TOKEN: ${{ secrets.ACCOUNT_MODIFY_TOKEN }}
      INNOVOX_USERNAME: ${{ secrets.INNOVOX_USERNAME }}
      INNOVOX_PASSWORD: ${{ secrets.INNOVOX_PASSWORD }}
