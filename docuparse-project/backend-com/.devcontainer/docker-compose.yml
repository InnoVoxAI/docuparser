version: '3.9'

services:

  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
      - ..:/workspace:cached

    command: sleep infinity

    networks:
      - devnet

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16

    restart: unless-stopped

    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: app

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - devnet

  redis:
    image: redis:7

    restart: unless-stopped

    ports:
      - "6379:6379"

    networks:
      - devnet

volumes:
  postgres-data:

networks:
  devnet:
