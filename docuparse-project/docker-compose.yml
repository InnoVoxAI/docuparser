services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docuparse}
      POSTGRES_USER: ${POSTGRES_USER:-docuparse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docuparse}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuparse-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuparse-network

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-docuparse}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-docuparse-local}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docuparse-network

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_CORE_URL: http://backend-core:8000
      VITE_BACKEND_COM_URL: http://backend-com:8070
    networks:
      - docuparse-network
    depends_on:
      backend-core:
        condition: service_healthy
      backend-com:
        condition: service_healthy

  backend-core:
    build: ./backend-core
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend-core:/app
      - ./contracts:/contracts:ro
      - ./shared:/shared:ro
      - docuparse-storage:/data/storage
      - docuparse-events:/data/events
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      BACKEND_OCR_URL: http://backend-ocr:8080
      LANGEXTRACT_SERVICE_URL: http://langextract-service:8091
      PYTHONPATH: /app:/contracts:/shared
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-docuparse}
      POSTGRES_USER: ${POSTGRES_USER:-docuparse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docuparse}
      DOCUPARSE_LOCAL_STORAGE_DIR: /data/storage
      DOCUPARSE_LOCAL_EVENT_DIR: /data/events
      DOCUPARSE_APPROVED_EXPORT_DIR: /data/exports/approved
      DOCUPARSE_EVENT_BUS: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DOCUPARSE_AUTO_PROCESS_OCR: ${DOCUPARSE_AUTO_PROCESS_OCR:-true}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ocr/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docuparse-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      backend-ocr:
        condition: service_started
      backend-com:
        condition: service_started

  backend-core-events:
    build: ./backend-core
    command: sh -c "python manage.py migrate --noinput && python manage.py consume_events"
    profiles:
      - async-workers
    volumes:
      - ./backend-core:/app
      - ./contracts:/contracts:ro
      - ./shared:/shared:ro
      - docuparse-storage:/data/storage
      - docuparse-events:/data/events
      - docuparse-events:/data/events
    env_file:
      - .env
    environment:
      BACKEND_OCR_URL: http://backend-ocr:8080
      PYTHONPATH: /app:/contracts:/shared
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-docuparse}
      POSTGRES_USER: ${POSTGRES_USER:-docuparse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docuparse}
      DOCUPARSE_LOCAL_STORAGE_DIR: /data/storage
      DOCUPARSE_LOCAL_EVENT_DIR: /data/events
      DOCUPARSE_APPROVED_EXPORT_DIR: /data/exports/approved
      DOCUPARSE_EVENT_BUS: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    networks:
      - docuparse-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  backend-com:
    build: ./backend-com
    command: uvicorn backend_com.api.app:app --host 0.0.0.0 --port 8070 --reload
    volumes:
      - ./backend-com/src:/app/src
      - ./contracts:/contracts:ro
      - ./shared:/shared:ro
      - docuparse-storage:/data/storage
      - docuparse-events:/data/events
    env_file:
      - .env
    ports:
      - "8070:8070"
    environment:
      PYTHONPATH: /app/src:/contracts:/shared
      DOCUPARSE_EVENT_BUS: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DOCUPARSE_LOCAL_STORAGE_DIR: /data/storage
      DOCUPARSE_LOCAL_EVENT_DIR: /data/events
      BACKEND_CORE_DOCUMENT_RECEIVED_URL: http://backend-core:8000/api/ocr/events/document-received
      BACKEND_CORE_EMAIL_SETTINGS_URL: http://backend-core:8000/api/ocr/settings/email
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8070/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docuparse-network
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  backend-ocr:
    build: ./backend-ocr
    command: uvicorn api.app:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      - ./backend-ocr:/app
      - ./contracts:/contracts:ro
      - ./shared:/shared:ro
      - docuparse-storage:/data/storage
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app:/contracts:/shared
      DOCUPARSE_EVENT_BUS: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DOCUPARSE_LOCAL_STORAGE_DIR: /data/storage
      DOCUPARSE_LOCAL_EVENT_DIR: /data/events
      DOCUPARSE_OCR_WORKER_ENABLED: ${DOCUPARSE_OCR_WORKER_ENABLED:-false}
      OPENROUTER_FALLBACK_MODEL: ${OPENROUTER_FALLBACK_MODEL:-qwen/qwen2.5-vl-72b-instruct}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docuparse-network
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  backend-ocr-worker:
    build: ./backend-ocr
    command: python -m application.run_worker
    profiles:
      - async-workers
    volumes:
      - ./backend-ocr:/app
      - ./contracts:/contracts:ro
      - ./shared:/shared:ro
      - docuparse-storage:/data/storage
      - docuparse-events:/data/events
    env_file:
      - .env
    environment:
      PYTHONPATH: /app:/contracts:/shared
      DOCUPARSE_EVENT_BUS: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DOCUPARSE_LOCAL_STORAGE_DIR: /data/storage
      DOCUPARSE_LOCAL_EVENT_DIR: /data/events
      OPENROUTER_FALLBACK_MODEL: ${OPENROUTER_FALLBACK_MODEL:-qwen/qwen2.5-vl-72b-instruct}
      DOCUPARSE_OCR_WORKER_ALLOW_MOCK: ${DOCUPARSE_OCR_WORKER_ALLOW_MOCK:-false}
    networks:
      - docuparse-network
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  layout-service:
    build: ./layout-service
    command: uvicorn api.app:app --host 0.0.0.0 --port 8090 --reload
    volumes:
      - ./layout-service:/app
      - ./contracts:/contracts:ro
      - ./shared:/shared:ro
      - docuparse-storage:/data/storage
      - docuparse-events:/data/events
    ports:
      - "8090:8090"
    environment:
      PYTHONPATH: /app:/contracts:/shared
      DOCUPARSE_EVENT_BUS: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DOCUPARSE_LOCAL_STORAGE_DIR: /data/storage
      DOCUPARSE_LOCAL_EVENT_DIR: /data/events
      DOCUPARSE_LAYOUT_WORKER_ENABLED: ${DOCUPARSE_LAYOUT_WORKER_ENABLED:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docuparse-network
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  layout-worker:
    build: ./layout-service
    command: python -m application.run_worker
    profiles:
      - async-workers
    volumes:
      - ./layout-service:/app
      - ./contracts:/contracts:ro
      - ./shared:/shared:ro
      - docuparse-storage:/data/storage
      - docuparse-events:/data/events
    environment:
      PYTHONPATH: /app:/contracts:/shared
      DOCUPARSE_EVENT_BUS: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DOCUPARSE_LOCAL_STORAGE_DIR: /data/storage
      DOCUPARSE_LOCAL_EVENT_DIR: /data/events
    networks:
      - docuparse-network
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  langextract-service:
    build: ./langextract-service
    command: uvicorn api.app:app --host 0.0.0.0 --port 8091 --reload
    volumes:
      - ./langextract-service:/app
      - ./contracts:/contracts:ro
      - ./shared:/shared:ro
      - docuparse-storage:/data/storage
      - docuparse-events:/data/events
    ports:
      - "8091:8091"
    environment:
      PYTHONPATH: /app:/contracts:/shared
      DOCUPARSE_EVENT_BUS: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DOCUPARSE_LOCAL_STORAGE_DIR: /data/storage
      DOCUPARSE_LOCAL_EVENT_DIR: /data/events
      DOCUPARSE_EXTRACTION_WORKER_ENABLED: ${DOCUPARSE_EXTRACTION_WORKER_ENABLED:-false}
      # LLM extraction — same key used by backend-ocr
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # LANGEXTRACT_MODEL takes precedence over OPENROUTER_MODEL for text extraction.
      # Use a text-capable model here; backend-ocr uses its own vision model separately.
      LANGEXTRACT_MODEL: ${LANGEXTRACT_MODEL:-deepseek/deepseek-chat-v3-0324:free}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      # Used to fetch LayoutConfig + SchemaConfig for schema-guided extraction
      BACKEND_CORE_URL: http://backend-core:8000
      DOCUPARSE_INTERNAL_SERVICE_TOKEN: ${DOCUPARSE_INTERNAL_SERVICE_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docuparse-network
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  langextract-worker:
    build: ./langextract-service
    command: python -m application.run_worker
    profiles:
      - async-workers
    volumes:
      - ./langextract-service:/app
      - ./contracts:/contracts:ro
      - ./shared:/shared:ro
      - docuparse-storage:/data/storage
      - docuparse-events:/data/events
    environment:
      PYTHONPATH: /app:/contracts:/shared
      DOCUPARSE_EVENT_BUS: redis
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DOCUPARSE_LOCAL_STORAGE_DIR: /data/storage
      DOCUPARSE_LOCAL_EVENT_DIR: /data/events
      # LLM extraction — same key used by backend-ocr
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LANGEXTRACT_MODEL: ${LANGEXTRACT_MODEL:-deepseek/deepseek-chat-v3-0324:free}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      # Used to fetch LayoutConfig + SchemaConfig for schema-guided extraction
      BACKEND_CORE_URL: http://backend-core:8000
      DOCUPARSE_INTERNAL_SERVICE_TOKEN: ${DOCUPARSE_INTERNAL_SERVICE_TOKEN:-}
    networks:
      - docuparse-network
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

networks:
  docuparse-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  docuparse-storage:
  docuparse-events:
